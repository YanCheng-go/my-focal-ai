services:
  rsshub:
    # Use chromium image for Xiaohongshu route support — it includes Puppeteer.
    # Switch to diygod/rsshub:latest if you don't need XHS and want a smaller image.
    image: diygod/rsshub:chromium-bundled
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 600
      # --- Twitter/X ---
      # Requires a logged-in auth token. Get it from browser cookies (auth_token).
      # See: https://docs.rsshub.app/deploy/config#twitter
      # TWITTER_AUTH_TOKEN: ""
      #
      # --- Xiaohongshu ---
      # XHS works with the chromium image, no auth needed.
      # If it gets blocked, set XHS cookies via env var (don't hardcode here):
      XIAOHONGSHU_COOKIE: "${XIAOHONGSHU_COOKIE:-}"
