name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why?
      placeholder: What problem does this solve?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "High — must fix soon"
        - "Medium — should do, not urgent"
        - "Low — nice to have"
    validations:
      required: false
  - type: dropdown
    id: size
    attributes:
      label: Estimated size
      options:
        - "Small (< 1 hour)"
        - "Medium (1–4 hours)"
        - "Large (> 4 hours)"
    validations:
      required: false
