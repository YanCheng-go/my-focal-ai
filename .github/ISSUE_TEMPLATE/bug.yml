name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `ainews fetch`
        2. ...
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "High — must fix soon"
        - "Medium — should do, not urgent"
        - "Low — nice to have"
    validations:
      required: false
  - type: dropdown
    id: size
    attributes:
      label: Estimated size
      options:
        - "Small (< 1 hour)"
        - "Medium (1–4 hours)"
        - "Large (> 4 hours)"
    validations:
      required: false
