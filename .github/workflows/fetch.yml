name: Fetch & Export

on:
  schedule:
    - cron: "17 */2 * * *"  # every 2 hours at :17
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      # Restore cached DB from previous runs (for dedup)
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/ainews.db
          key: ainews-db

      # Fetch RSS/YouTube/arXiv feeds; scores with Claude API if key is set
      - name: Fetch and score
        run: uv run ainews cloud-fetch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

      # Export scored items to static JSON
      - name: Export to JSON
        run: uv run ainews export --hours 48 --output static/data.json

      # Commit and push if data changed
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update data.json [skip ci]"
          git push
