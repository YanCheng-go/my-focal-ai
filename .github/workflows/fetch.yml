name: Fetch & Export

on:
  schedule:
    - cron: "17 */2 * * *"  # every 2 hours at :17
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # Restore cached DB from previous runs (for dedup + data retention).
      # GitHub caches are immutable, so we use a date-based key and fall back
      # to the most recent cache via restore-keys. This keeps ~7 days of data.
      - name: Restore DB cache
        uses: actions/cache@v5
        with:
          path: data/ainews.db
          key: ainews-db-${{ github.run_id }}
          restore-keys: |
            ainews-db-

      # Fetch RSS/YouTube/arXiv feeds; scores with Claude API if key is set
      - name: Fetch and score
        run: uv run ainews cloud-fetch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}

      # Export scored items to static JSON (includes Supabase config for admin auth)
      - name: Export to JSON
        run: uv run ainews export --hours 168 --output static/data.json
        env:
          AINEWS_SUPABASE_URL: ${{ secrets.AINEWS_SUPABASE_URL || '' }}
          AINEWS_SUPABASE_KEY: ${{ secrets.AINEWS_SUPABASE_KEY || '' }}

      # Commit and push if data changed
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data.json static/config.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update data.json [skip ci]"
          git pull --rebase --autostash origin main
          git push
