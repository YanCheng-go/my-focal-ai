name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check src/
      - uses: astral-sh/ruff-action@v3
        env:
          RUFF_OUTPUT_FORMAT: ""
        with:
          args: format --check src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run pytest --tb=short -q -m "not integration"

  check-static-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-static-pages.sh

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: uv sync --extra dev
      - name: Start server and run responsive tests
        run: |
          uv run ainews serve &
          for i in $(seq 1 15); do curl -sf http://localhost:8000/ > /dev/null && break || sleep 1; done || { echo "Server failed to start"; exit 1; }
          npx playwright test --reporter=list --grep-invert "renders correctly"
        env:
          AINEWS_SCORING: "false"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
