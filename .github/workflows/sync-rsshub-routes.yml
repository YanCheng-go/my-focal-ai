name: Sync RSSHub Route Map

on:
  schedule:
    - cron: "0 7 * * 1"  # Every Monday at 07:00 UTC (1hr after Olshansk sync)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync RSSHub route map
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/sync_rsshub_routes.py

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update RSSHub route map"
          branch: auto/sync-rsshub-routes
          title: "Update RSSHub route map"
          body: |
            Auto-synced `RSSHUB_URL_MAP` from [DIYgod/RSSHub](https://github.com/DIYgod/RSSHub) route definitions.

            Pasting a website URL in the admin UI will now automatically resolve to the correct RSSHub route when one exists.
          labels: "automation,size:small"
          delete-branch: true
