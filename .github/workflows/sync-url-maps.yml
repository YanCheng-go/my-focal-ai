name: Sync URL Maps

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync RSSHub route map
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/sync_rsshub_routes.py

      - name: Sync Olshansk feed map (reads freshly-written RSSHub map)
        run: uv run python scripts/sync_olshansk_feeds.py

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update URL maps (RSSHub + Olshansk)"
          branch: auto/sync-url-maps
          title: "Update URL maps (RSSHub + Olshansk)"
          body: |
            Auto-synced URL maps:
            - `RSSHUB_URL_MAP` from [DIYgod/RSSHub](https://github.com/DIYgod/RSSHub)
            - `OLSHANSK_FEED_MAP` from [Olshansk/rss-feeds](https://github.com/Olshansk/rss-feeds)

            Pasting a website URL in the admin UI will resolve to the correct feed source when one exists.
          labels: "automation,size:small"
          delete-branch: true
