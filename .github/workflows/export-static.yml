name: Export Static Data

on:
  push:
    branches: [main]
    paths:
      - "config/sources.yml"
      - "src/ainews/export.py"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # Restore cached DB for data.json export
      - name: Restore DB cache
        uses: actions/cache@v5
        with:
          path: data/ainews.db
          key: ainews-db-${{ github.run_id }}
          restore-keys: |
            ainews-db-

      - name: Export static data
        run: uv run ainews export --hours 168 --output static/data.json
        env:
          AINEWS_SUPABASE_URL: ${{ secrets.AINEWS_SUPABASE_URL || '' }}
          AINEWS_SUPABASE_KEY: ${{ secrets.AINEWS_SUPABASE_KEY || '' }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data.json static/config.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update static data [skip ci]"
          git pull --rebase --autostash origin main
          git push
