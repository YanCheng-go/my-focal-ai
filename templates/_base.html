<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default('MyFocalAI') }}</title>
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
            document.documentElement.classList.add('dark');
    })();
    </script>
    <!-- SRI: regenerate with: curl -s <cdn-url> | openssl dgst -sha384 -binary | openssl base64 -A -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.1" integrity="sha384-NIEnmBZDJa6zQwZWLtsVZJlPYu8tc0CNul8EMJ0WMxf4ZpsKsOfKjtEToHNCoIOH" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/fluid-type.css">
    <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-neutral-950 dark:text-gray-200 antialiased">
    <nav class="border-b border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 sticky top-0 z-50">
        <div class="{{ container_class | default('max-w-4xl') }} mx-auto px-5 py-3">
            <div class="flex flex-wrap items-center gap-x-4 gap-y-2">
                <a href="/" class="flex items-center gap-2 shrink-0"><img src="/static/logo.svg" alt="MyFocalAI" class="w-7 h-7 rounded-lg"><span class="text-lg font-bold text-gray-900 dark:text-white">MyFocalAI</span></a>
                <!-- Desktop nav links (hidden on mobile) -->
                <div class="hidden sm:flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
                    <a href="/" class="inline-flex items-center gap-1 py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'dashboard' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">
                        Feeds
                        <span id="badge-dashboard" class="hidden bg-red-500 text-white text-[10px] rounded-full px-1 min-w-[14px] text-center leading-4 font-bold"></span>
                    </a>
                    <a href="/admin" class="py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'admin' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">Admin</a>
                    <a href="/leaderboard" class="py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'leaderboard' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">Leaderboard</a>
                    <a href="/trends" class="py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'trends' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">Trends</a>
                    <a href="/ccc" class="inline-flex items-center gap-1 py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'ccc' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">
                        CCC
                        <span id="badge-ccc" class="hidden bg-red-500 text-white text-[10px] rounded-full px-1 min-w-[14px] text-center leading-4 font-bold"></span>
                    </a>
                    <a href="/events" class="py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'events' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">Events</a>
                    <a href="/about" class="py-1 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'about' else 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200' }}">About</a>
                </div>
                <div class="flex items-center gap-1 ml-auto">
                    <a href="https://buymeacoffee.com/maverickmiaow" target="_blank" rel="noopener noreferrer" class="hidden sm:inline-flex items-center gap-1 px-2 py-1 text-xs text-gray-400 hover:text-yellow-500 dark:hover:text-yellow-400" title="Support the Developer">&#x2615; Support</a>
                    <button onclick="setTheme('light')" id="theme-light" class="p-1.5 rounded cursor-pointer" title="Light">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <button onclick="setTheme('system')" id="theme-system" class="p-1.5 rounded cursor-pointer" title="System">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </button>
                    <button onclick="setTheme('dark')" id="theme-dark" class="p-1.5 rounded cursor-pointer" title="Dark">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <a href="https://github.com/YanCheng-go/my-focal-ai" target="_blank" rel="noopener" class="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" title="GitHub">
                        <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    </a>
                    <!-- Hamburger button (mobile only) -->
                    <div class="w-px h-4 bg-gray-200 dark:bg-neutral-700 mx-1 sm:hidden"></div>
                    <button onclick="toggleMobileMenu()" class="sm:hidden p-1.5 rounded cursor-pointer text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-neutral-800" title="Menu" id="hamburger-btn">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                </div>
            </div>
            <!-- Mobile nav links (hidden by default, toggled by hamburger) -->
            <div class="hidden sm:hidden flex-col gap-1 pt-3 pb-1 border-t border-gray-100 dark:border-neutral-800 mt-3 text-sm" id="nav-links-mobile">
                <a href="/" class="inline-flex items-center gap-1 py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'dashboard' else 'text-gray-600 dark:text-gray-300' }}">
                    Feeds
                    <span id="badge-dashboard-m" class="hidden bg-red-500 text-white text-[10px] rounded-full px-1 min-w-[14px] text-center leading-4 font-bold"></span>
                </a>
                <a href="/admin" class="py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'admin' else 'text-gray-600 dark:text-gray-300' }}">Admin</a>
                <a href="/leaderboard" class="py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'leaderboard' else 'text-gray-600 dark:text-gray-300' }}">Leaderboard</a>
                <a href="/trends" class="py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'trends' else 'text-gray-600 dark:text-gray-300' }}">Trends</a>
                <a href="/ccc" class="inline-flex items-center gap-1 py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'ccc' else 'text-gray-600 dark:text-gray-300' }}">
                    CCC
                    <span id="badge-ccc-m" class="hidden bg-red-500 text-white text-[10px] rounded-full px-1 min-w-[14px] text-center leading-4 font-bold"></span>
                </a>
                <a href="/events" class="py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'events' else 'text-gray-600 dark:text-gray-300' }}">Events</a>
                <a href="/about" class="py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 {{ 'text-blue-600 dark:text-blue-400 font-medium' if active_page == 'about' else 'text-gray-600 dark:text-gray-300' }}">About</a>
                <a href="https://buymeacoffee.com/maverickmiaow" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 py-2 px-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-800 text-gray-400 hover:text-yellow-500 dark:hover:text-yellow-400">&#x2615; Support</a>
            </div>
        </div>
    </nav>

    <main class="{{ container_class | default('max-w-4xl') }} mx-auto px-5 py-5">
        {% block content %}{% endblock %}
    </main>

    <script>
    function setTheme(mode) {
        if (mode === 'dark') {
            localStorage.setItem('theme', 'dark');
            document.documentElement.classList.add('dark');
        } else if (mode === 'light') {
            localStorage.setItem('theme', 'light');
            document.documentElement.classList.remove('dark');
        } else {
            localStorage.removeItem('theme');
            document.documentElement.classList.toggle('dark',
                window.matchMedia('(prefers-color-scheme: dark)').matches);
        }
        updateThemeButtons();
    }
    function updateThemeButtons() {
        var t = localStorage.getItem('theme');
        ['light', 'system', 'dark'].forEach(function(m) {
            var el = document.getElementById('theme-' + m);
            var isActive = (m === 'system' && !t) || (t === m);
            el.className = 'p-1.5 rounded cursor-pointer ' +
                (isActive ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300');
        });
    }
    updateThemeButtons();

    // Mobile hamburger menu toggle
    var menuIcon = '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>';
    var closeIcon = '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';
    function toggleMobileMenu() {
        var mobile = document.getElementById('nav-links-mobile');
        var btn = document.getElementById('hamburger-btn');
        if (!mobile) return;
        var isOpen = !mobile.classList.contains('hidden');
        if (isOpen) {
            mobile.classList.add('hidden');
            mobile.classList.remove('flex');
            btn.innerHTML = menuIcon;
        } else {
            mobile.classList.remove('hidden');
            mobile.classList.add('flex');
            btn.innerHTML = closeIcon;
        }
    }
    window.toggleMobileMenu = toggleMobileMenu;

    (function() {
        var pages = ['dashboard', 'trends', 'ccc'];
        var badgePages = ['dashboard', 'ccc'];  // trends badge disabled
        var currentPage = '{{ active_page | default("") }}';

        // Migrate from single key to per-page keys
        var old = localStorage.getItem('ainews_last_seen');
        if (old && !localStorage.getItem('ainews_last_seen_dashboard')) {
            pages.forEach(function(p) { localStorage.setItem('ainews_last_seen_' + p, old); });
            localStorage.removeItem('ainews_last_seen');
        }

        // First visit: initialise all timestamps and return
        var hasAny = pages.some(function(p) { return localStorage.getItem('ainews_last_seen_' + p); });
        if (!hasAny) {
            var now = new Date().toISOString();
            pages.forEach(function(p) { localStorage.setItem('ainews_last_seen_' + p, now); });
            return;
        }

        // Build per-page since params (only for badge-enabled pages)
        var params = [];
        badgePages.forEach(function(p) {
            var ts = localStorage.getItem('ainews_last_seen_' + p);
            if (ts) params.push('since_' + p + '=' + encodeURIComponent(ts));
        });
        if (!params.length) return;

        fetch('/api/badge-counts?' + params.join('&'))
            .then(function(r) { return r.json(); })
            .then(function(counts) {
                Object.keys(counts).forEach(function(page) {
                    ['badge-' + page, 'badge-' + page + '-m'].forEach(function(id) {
                        var el = document.getElementById(id);
                        if (el && counts[page] > 0) {
                            el.textContent = counts[page] > 99 ? '99+' : counts[page];
                            el.classList.remove('hidden');
                        }
                    });
                });
            }).catch(function() {});

        // Only update the current page's last-seen timestamp
        if (currentPage && pages.indexOf(currentPage) !== -1) {
            localStorage.setItem('ainews_last_seen_' + currentPage, new Date().toISOString());
        }
    })();
    </script>
    <script>
    // Sync server-set cookies to localStorage (safety net for local mode nav badges)
    (function() {
        ['dashboard', 'trends', 'ccc'].forEach(function(p) {
            var key = 'ainews_last_seen_' + p;
            if (!localStorage.getItem(key)) {
                var m = document.cookie.match(new RegExp('(?:^|; )' + key + '=([^;]*)'));
                if (m) localStorage.setItem(key, decodeURIComponent(m[1]));
            }
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
