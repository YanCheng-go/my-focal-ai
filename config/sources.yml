# Source configuration for ai-news-filter
# RSSHub docs: https://docs.rsshub.app/
# RSSHub routes become: http://localhost:1200/<route>

rsshub_base: "http://localhost:1200"

sources:
  # === Twitter/X ===
  twitter:
    - handle: "trq212"
      tags: [ai]

  # === YouTube ===
  # Native RSS — no RSSHub needed.
  youtube:
    - channel_id: "UC2ojq-nuP8ceeHqiroeKhBA"
      name: "Nate Herk | AI Automation"
      tags: [ai, automation]
    - channel_id: "UCYO_jab_esuFRV4b17AJtAw"
      name: "Andrej Karpathy"
      tags: [ai, research, deep-learning]
    - channel_id: "UCoQ8B21RIncI9NWLr2d2Y_w"
      name: "TechWorld with Nana"
      tags: [devops, cloud, tooling]

  # === Direct RSS/Atom feeds ===
  rss:
    # --- Research ---
    - url: "https://rss.arxiv.org/rss/cs.AI"
      name: "arXiv cs.AI"
      tags: [ai, research, papers]
    - url: "https://rss.arxiv.org/rss/cs.LG"
      name: "arXiv cs.LG (Machine Learning)"
      tags: [ai, research, ml, papers]
    - url: "https://rss.arxiv.org/rss/cs.CL"
      name: "arXiv cs.CL (NLP/LLM)"
      tags: [ai, research, nlp, llm, papers]

    # --- Company/Lab blogs ---
    - url: "https://openai.com/blog/rss.xml"
      name: "OpenAI Blog"
      tags: [ai, openai, company]
    # Anthropic has no public RSS — use RSSHub route instead (see rsshub section below)

    # --- Open source / community ---
    - url: "https://huggingface.co/blog/feed.xml"
      name: "Hugging Face Blog"
      tags: [ai, open-source, huggingface]

    # --- Practitioners ---
    - url: "https://simonwillison.net/atom/everything/"
      name: "Simon Willison"
      tags: [ai, tooling, open-source]
    - url: "https://lilianweng.github.io/index.xml"
      name: "Lilian Weng"
      tags: [ai, research, deep-learning]

  # === Xiaohongshu ===
  # Route format: /xiaohongshu/user/:user_id/notes
  # Find user_id from their profile URL.
  xiaohongshu: []
    # - user_id: "YOUR_USER_ID"
    #   name: "Account Name"
    #   tags: [ai]

  # === RSSHub-scraped sites (no native RSS) ===
  rsshub:
    - route: "/anthropic/news"
      name: "Anthropic News"
      source_type: "rss"
      tags: [ai, anthropic, company]
    - route: "/anthropic/research"
      name: "Anthropic Research"
      source_type: "rss"
      tags: [ai, anthropic, research]
    - route: "/claude/changelog"
      name: "Claude Changelog"
      source_type: "rss"
      tags: [ai, claude, anthropic, product]

  # === Events (Luma) ===
  # RSSHub route: /lu.ma/community/:handle
  # These are checked for upcoming AI/Databricks events in Copenhagen.
  luma:
    - handle: "dtc-events"
      tags: [events, ai, copenhagen]
      # Additional Luma communities can be added here.
      # Search for AI/Databricks events in Copenhagen on lu.ma and add their handles.

# === ArXiv keyword searches ===
# These use the arXiv API (Atom feed) for targeted queries beyond the category RSS.
# The ingestion layer fetches these as regular Atom feeds.
arxiv_queries:
  - query: "cat:cs.AI+AND+abs:transformer"
    name: "arXiv: transformers"
    tags: [ai, research, transformers]
  - query: "cat:cs.CL+AND+abs:large+language+model"
    name: "arXiv: LLMs"
    tags: [ai, research, llm]
  - query: "cat:cs.LG+AND+abs:reinforcement+learning"
    name: "arXiv: RL"
    tags: [ai, research, rl]

# Add your own sources. Use tags to help the scoring engine.
