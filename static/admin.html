<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MyFocalAI</title>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
            document.documentElement.classList.add('dark');
    })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-neutral-950 dark:text-gray-200 antialiased">
    <nav id="main-nav" data-active="admin" class="border-b border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 sticky top-0 z-50"></nav>
    <script src="nav.js"></script>
    <script src="shared-config.js"></script>

    <main class="max-w-5xl mx-auto px-5 py-5">
        <!-- State 1/2: Logged out (covers both no-supabase and has-supabase) -->
        <div id="state-login" class="hidden">
            <div class="max-w-sm mx-auto mt-12">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-6 text-center">Add, edit, and manage your feed sources. Sign in to get started.</p>
                <h2 id="admin-auth-title" class="text-xl font-bold text-gray-900 dark:text-white mb-4">Sign in to manage sources</h2>
                <form id="auth-form" onsubmit="return handleAuth(event)">
                    <input type="email" id="auth-email" placeholder="Email" required
                        class="w-full px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500 mb-3">
                    <input type="password" id="auth-password" placeholder="Password" required minlength="6"
                        class="w-full px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500 mb-3">
                    <button type="submit" id="admin-auth-submit" class="w-full px-3 py-2 rounded-md bg-blue-600 text-white text-sm cursor-pointer hover:bg-blue-700">Sign In</button>
                    <p id="auth-error" class="text-red-500 text-xs mt-2 hidden"></p>
                    <p id="auth-success" class="text-green-600 text-xs mt-2 hidden"></p>
                    <p class="text-xs text-center mt-3 text-gray-500 dark:text-gray-400" id="admin-auth-toggle-text">Don't have an account? <a href="#" onclick="toggleAdminAuth(event)" class="text-blue-600 dark:text-blue-400 hover:underline">Sign up</a></p>
                </form>
            </div>
        </div>

        <!-- State 3: Logged in — source CRUD -->
        <div id="state-admin" class="hidden">
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Add, edit, and manage your feed sources. Each source is fetched on demand and scored against your interests.</p>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-gray-900 dark:text-white">Sources</h2>
                <div class="flex gap-2 items-center">
                    <button id="fetch-all-btn" class="px-3 py-1.5 rounded-md bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-400 border border-green-300 dark:border-green-700 text-sm cursor-pointer hover:bg-green-200 dark:hover:bg-green-800/50" onclick="fetchAll(this)">Fetch All</button>
                    <button class="px-3 py-1.5 rounded-md bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-400 border border-blue-300 dark:border-blue-700 text-sm cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800/50" onclick="openAddModal()">Add Source</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr>
                            <th class="text-left text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 font-medium py-3 px-3">Name</th>
                            <th class="text-left text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 font-medium py-3 px-3">Type</th>
                            <th class="text-left text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 font-medium py-3 px-3">Tags</th>
                            <th class="text-left text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 font-medium py-3 px-3">Status</th>
                            <th class="text-left text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 font-medium py-3 px-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sources-body">
                        <tr><td colspan="5" class="text-center text-gray-400 dark:text-gray-500 py-8">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- Add/Edit Modal (outside main to avoid z-index/hidden issues) -->
    <div class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center" id="modal-overlay">
        <div class="bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl p-6 w-[500px] max-w-[95vw] max-h-[90vh] overflow-y-auto">
            <h2 id="modal-title" class="text-lg font-bold text-gray-900 dark:text-white mb-4">Add Source</h2>
            <form id="source-form" onsubmit="return handleSubmit(event)">
                <div id="resolve-section" class="mb-4 pb-4 border-b border-gray-200 dark:border-neutral-700">
                    <label class="block text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1">Quick Add — paste a URL</label>
                    <div class="flex gap-2">
                        <input type="url" id="resolve-url" placeholder="Paste any URL: YouTube, Twitter/X, arXiv, RSS, Luma, RSSHub..."
                            class="flex-1 px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500">
                        <button type="button" id="resolve-btn" onclick="resolveUrl()" class="px-3 py-1.5 rounded-md bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-400 border border-blue-300 dark:border-blue-700 text-sm cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800/50">Resolve</button>
                    </div>
                    <p id="resolve-status" class="text-xs mt-1 hidden"></p>
                </div>
                <div class="mb-3.5">
                    <label for="source-type" class="block text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1">Type</label>
                    <select id="source-type" onchange="updateFields()" class="w-full px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500">
                        <option value="">Select type...</option>
                    </select>
                </div>
                <div id="dynamic-fields"></div>
                <div class="mb-3.5">
                    <label for="source-tags" class="block text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1">Tags (comma-separated)</label>
                    <input type="text" id="source-tags" placeholder="ai, research, company" class="w-full px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500">
                </div>
                <div class="flex gap-2 justify-end mt-5">
                    <button type="button" class="px-3 py-1.5 rounded-md bg-transparent text-gray-500 border border-gray-300 dark:border-neutral-600 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="px-3 py-1.5 rounded-md bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-400 border border-blue-300 dark:border-blue-700 text-sm cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800/50">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-success" class="fixed bottom-5 right-5 hidden bg-green-100 dark:bg-green-900/50 text-green-800 dark:text-green-400 border border-green-300 dark:border-green-700 px-5 py-2.5 rounded-lg text-sm z-[200]"></div>
    <div id="toast-error" class="fixed bottom-5 right-5 hidden bg-red-100 dark:bg-red-900/50 text-red-800 dark:text-red-400 border border-red-300 dark:border-red-700 px-5 py-2.5 rounded-lg text-sm z-[200]"></div>

    <script>
    // --- Constants (populated from config.json in init()) ---
    let SOURCE_FIELDS = {};
    let TYPE_COLORS = {};
    let HIDDEN_TYPES = [];
    let HIDDEN_SOURCES = [];
    let DEFAULT_USER_SOURCES = [];

    const FIELD_LABELS = {
        handle: 'Handle', channel_id: 'Channel ID', name: 'Name', url: 'URL',
        route: 'Route', user_id: 'User ID', query: 'Query', source_type: 'Source Type', scraper: 'Scraper',
    };

    function loadSchemaFromConfig(config) {
        var schema = config.source_type_schema || {};
        HIDDEN_TYPES = config.hidden_source_types || [];
        HIDDEN_SOURCES = config.hidden_sources || [];
        DEFAULT_USER_SOURCES = config.default_user_sources || [];
        SOURCE_FIELDS = {};
        TYPE_COLORS = {};
        Object.keys(schema).forEach(function(key) {
            SOURCE_FIELDS[key] = schema[key].fields || {required: [], optional: []};
            TYPE_COLORS[key] = schema[key].color || 'bg-gray-100 text-gray-600 dark:bg-neutral-800 dark:text-gray-400';
        });
        // Populate source type dropdown
        var sel = document.getElementById('source-type');
        // Remove existing options except the placeholder
        while (sel.options.length > 1) sel.remove(1);
        Object.keys(schema).forEach(function(key) {
            var opt = document.createElement('option');
            opt.value = key;
            opt.textContent = schema[key].label || key;
            sel.appendChild(opt);
        });
    }

    // --- Utilities ---
    function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function timeAgo(iso) {
        var d = new Date(iso);
        var now = new Date();
        var mins = Math.floor((now - d) / 60000);
        if (mins < 60) return mins + 'm ago';
        var hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        return Math.floor(hrs / 24) + 'd ago';
    }

    function showToast(msg, type) {
        var el = document.getElementById('toast-' + type);
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    function showState(state) {
        ['state-login', 'state-admin'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.classList.add('hidden');
        });
        var target = document.getElementById('state-' + state);
        if (target) target.classList.remove('hidden');
    }

    // --- Supabase client ---
    let sb = null;
    let editingSource = null;

    async function init() {
        try {
            var config = await getConfig();
            if (!config) { showState('login'); return; }
            if (!config.supabase_url || !config.supabase_anon_key) {
                showState('login');
                return;
            }
            loadSchemaFromConfig(config);
            sb = window._sb || supabase.createClient(config.supabase_url, config.supabase_anon_key);
            window._sb = sb;
            var { data: { session } } = await sb.auth.getSession();
            if (session) {
                showLoggedIn(session.user);
            } else {
                showState('login');
            }
            sb.auth.onAuthStateChange(function(event, session) {
                if (event === 'SIGNED_IN' && session) showLoggedIn(session.user);
                else if (event === 'SIGNED_OUT') showState('login');
            });
        } catch (e) {
            console.error('Admin init failed:', e);
            showState('login');
        }
    }

    function showLoggedIn(user) {
        showState('admin');
        loadSources();
    }

    // --- Auth ---
    var adminSignUpMode = false;
    function toggleAdminAuth(e) {
        if (e) e.preventDefault();
        adminSignUpMode = !adminSignUpMode;
        var title = document.getElementById('admin-auth-title');
        var btn = document.getElementById('admin-auth-submit');
        var toggle = document.getElementById('admin-auth-toggle-text');
        document.getElementById('auth-error').classList.add('hidden');
        document.getElementById('auth-success').classList.add('hidden');
        if (adminSignUpMode) {
            if (title) title.textContent = 'Create an account';
            if (btn) btn.textContent = 'Sign Up';
            if (toggle) toggle.innerHTML = 'Already have an account? <a href="#" onclick="toggleAdminAuth(event)" class="text-blue-600 dark:text-blue-400 hover:underline">Sign in</a>';
        } else {
            if (title) title.textContent = 'Sign in to manage sources';
            if (btn) btn.textContent = 'Sign In';
            if (toggle) toggle.innerHTML = 'Don\'t have an account? <a href="#" onclick="toggleAdminAuth(event)" class="text-blue-600 dark:text-blue-400 hover:underline">Sign up</a>';
        }
    }

    async function handleAuth(e) {
        e.preventDefault();
        var email = document.getElementById('auth-email').value;
        var password = document.getElementById('auth-password').value;
        document.getElementById('auth-error').classList.add('hidden');
        document.getElementById('auth-success').classList.add('hidden');

        if (adminSignUpMode) {
            return adminHandleSignUp();
        }

        var { error } = await sb.auth.signInWithPassword({ email: email, password: password });
        if (error) {
            var errEl = document.getElementById('auth-error');
            errEl.textContent = error.message;
            errEl.classList.remove('hidden');
        }
        return false;
    }

    async function adminHandleSignUp() {
        var email = document.getElementById('auth-email').value;
        var password = document.getElementById('auth-password').value;
        if (!email || !password) return;
        document.getElementById('auth-error').classList.add('hidden');
        document.getElementById('auth-success').classList.add('hidden');

        var { data, error } = await sb.auth.signUp({ email: email, password: password });
        if (error) {
            var errEl = document.getElementById('auth-error');
            errEl.textContent = error.message;
            errEl.classList.remove('hidden');
        } else if (data.user && data.user.identities && data.user.identities.length === 0) {
            // User already exists — Supabase returns empty identities instead of error
            var errEl = document.getElementById('auth-error');
            errEl.textContent = 'Account already exists. Please sign in instead.';
            errEl.classList.remove('hidden');
        } else if (data.session) {
            // Email confirmation disabled — signed in immediately
            showLoggedIn(data.session.user);
        } else {
            var successEl = document.getElementById('auth-success');
            successEl.textContent = 'Check your email to confirm your account.';
            successEl.classList.remove('hidden');
        }
    }


    // --- Seed defaults ---
    async function seedDefaults(btn) {
        var { data: { session } } = await sb.auth.getSession();
        if (!session) return;
        btn.disabled = true;
        btn.textContent = 'Loading...';
        var rows = DEFAULT_USER_SOURCES.map(function(src) {
            return { source_type: src.source_type, name: src.name, config: src.config, tags: src.tags || [], user_id: session.user.id };
        });
        var { error } = await sb.from('user_sources').insert(rows);
        if (error) {
            console.error('seedDefaults error:', error);
            showToast('Failed to load defaults: ' + error.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Load default sources (' + DEFAULT_USER_SOURCES.length + ')';
            return;
        }
        showToast('Loaded ' + DEFAULT_USER_SOURCES.length + ' default sources', 'success');
        loadSources();
    }

    // --- Source CRUD ---
    async function loadSources() {
        // #108: explicit user_id filter as defense-in-depth alongside RLS
        var { data: { session } } = await sb.auth.getSession();
        if (!session) return;
        var { data, error } = await sb.from('user_sources').select('*').eq('user_id', session.user.id).order('created_at', { ascending: true });
        if (error) { showToast(error.message, 'error'); return; }
        renderTable(data || []);
    }

    function renderTable(sources) {
        var tbody = document.getElementById('sources-body');
        if (!sources.length) {
            var msg = '<tr><td colspan="5" class="text-center py-8">' +
                '<p class="text-gray-400 dark:text-gray-500 mb-3">No sources configured.</p>';
            if (DEFAULT_USER_SOURCES.length) {
                msg += '<button class="px-3 py-1.5 rounded-md bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-400 border border-blue-300 dark:border-blue-700 text-sm cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800/50" onclick="seedDefaults(this)">Load default sources (' + DEFAULT_USER_SOURCES.length + ')</button>';
            } else {
                msg += '<p class="text-gray-400 dark:text-gray-500">Click "Add Source" to get started.</p>';
            }
            msg += '</td></tr>';
            tbody.innerHTML = msg;
            return;
        }
        tbody.innerHTML = sources.map(function(s) {
            var tags = (s.tags || []).map(function(t) { return '<span class="bg-indigo-100 text-indigo-700 dark:bg-indigo-950 dark:text-indigo-400 px-2 py-0.5 rounded text-xs mr-1">' + esc(t) + '</span>'; }).join('');
            var typeColor = TYPE_COLORS[s.source_type] || 'bg-gray-100 text-gray-600 dark:bg-neutral-800 dark:text-gray-400';
            var status = s.disabled
                ? '<span class="text-gray-400 dark:text-gray-600">Disabled</span>'
                : '<span class="text-green-600 dark:text-green-400">Enabled</span>';
            return '<tr class="hover:bg-gray-50 dark:hover:bg-neutral-900/50">' +
                '<td class="py-3 px-3 border-b border-gray-100 dark:border-neutral-800">' + esc(s.name) + '</td>' +
                '<td class="py-3 px-3 border-b border-gray-100 dark:border-neutral-800"><span class="inline-block px-2 py-0.5 rounded text-xs font-semibold ' + typeColor + '">' + esc(s.source_type) + '</span></td>' +
                '<td class="py-3 px-3 border-b border-gray-100 dark:border-neutral-800">' + (tags || '-') + '</td>' +
                '<td class="py-3 px-3 border-b border-gray-100 dark:border-neutral-800">' + status + '</td>' +
                '<td class="py-3 px-3 border-b border-gray-100 dark:border-neutral-800">' +
                    '<div class="flex gap-1 flex-wrap">' +
                        '<button class="px-2 py-1 rounded text-xs border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 cursor-pointer hover:bg-green-50 dark:hover:bg-green-950" data-action="fetch" data-idx="' + sources.indexOf(s) + '">Fetch</button>' +
                        '<button class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-neutral-700 text-gray-600 dark:text-gray-400 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800" data-action="edit" data-id="' + s.id + '">Edit</button>' +
                        '<button class="px-2 py-1 rounded text-xs border border-gray-200 dark:border-neutral-700 text-gray-600 dark:text-gray-400 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800" data-action="toggle" data-id="' + s.id + '" data-disabled="' + !!s.disabled + '">' + (s.disabled ? 'Enable' : 'Disable') + '</button>' +
                        '<button class="px-2 py-1 rounded text-xs border border-red-200 dark:border-red-900 text-red-600 dark:text-red-400 cursor-pointer hover:bg-red-50 dark:hover:bg-red-950" data-action="delete" data-id="' + s.id + '" data-name="' + esc(s.name) + '">Delete</button>' +
                    '</div>' +
                '</td>' +
            '</tr>';
        }).join('');

        // Store sources for edit lookups
        tbody._sources = sources;

        // Event delegation
        tbody.onclick = function(e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            var action = btn.dataset.action;
            var id = btn.dataset.id;
            if (action === 'fetch') {
                var idx = parseInt(btn.dataset.idx, 10);
                if (sources[idx]) fetchSource(sources[idx], btn);
            } else if (action === 'edit') {
                var source = sources.find(function(s) { return s.id === id; });
                if (source) openEditModal(source);
            } else if (action === 'toggle') {
                toggleSource(id, btn.dataset.disabled === 'true');
            } else if (action === 'delete') {
                deleteSource(id, btn.dataset.name);
            }
        };
    }

    // --- Modal ---
    function updateFields() {
        var type = document.getElementById('source-type').value;
        var container = document.getElementById('dynamic-fields');
        if (!type || !SOURCE_FIELDS[type]) { container.innerHTML = ''; return; }
        var schema = SOURCE_FIELDS[type];
        var allFields = schema.required.concat(schema.optional.filter(function(f) { return f !== 'tags'; }));
        var html = '';
        if (TYPE_HINTS[type] && !editingSource) {
            html += '<p class="text-xs text-blue-600 dark:text-blue-400 mb-3">' + TYPE_HINTS[type] + '</p>';
        }
        html += allFields.map(function(field) {
            var req = schema.required.includes(field);
            var val = editingSource ? ((editingSource.config || {})[field] || '') : '';
            if (field === 'name' && editingSource) val = editingSource.name || val;
            var ph = (FIELD_PLACEHOLDERS[field] || {})[type] || (FIELD_PLACEHOLDERS[field] || {})._default || '';
            return '<div class="mb-3.5">' +
                '<label class="block text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1">' + (FIELD_LABELS[field] || field) + (req ? ' *' : '') + '</label>' +
                '<input type="text" data-field="' + field + '" value="' + esc(String(val)) + '" ' + (req ? 'required' : '') + ' placeholder="' + esc(ph) + '"' +
                ' class="w-full px-3 py-2 rounded-md bg-gray-50 dark:bg-neutral-800 text-gray-900 dark:text-gray-200 border border-gray-200 dark:border-neutral-700 text-sm outline-none focus:border-blue-400 dark:focus:border-blue-500">' +
            '</div>';
        }).join('');
        container.innerHTML = html;
    }

    async function resolveUrl() {
        var urlInput = document.getElementById('resolve-url');
        var url = urlInput.value.trim();
        if (!url) return;
        var btn = document.getElementById('resolve-btn');
        var status = document.getElementById('resolve-status');
        btn.disabled = true; btn.textContent = '...';
        status.classList.add('hidden');
        try {
            var result = await resolveUrlClient(url);
            document.getElementById('source-type').value = result.source_type;
            updateFields();
            Object.keys(result.fields).forEach(function(key) {
                var input = document.querySelector('#dynamic-fields input[data-field="' + key + '"]');
                if (input) input.value = result.fields[key];
            });
            status.textContent = 'Resolved as ' + result.source_type + ' source';
            status.className = 'text-xs mt-1 text-green-600 dark:text-green-400';
        } catch (e) {
            status.textContent = e.message;
            status.className = 'text-xs mt-1 text-red-500';
        } finally {
            status.classList.remove('hidden');
            btn.disabled = false; btn.textContent = 'Resolve';
        }
    }

    async function resolveUrlClient(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        var a = document.createElement('a'); a.href = url;
        var host = a.hostname;
        var path = a.pathname.replace(/^\/+|\/+$/g, '');

        // --- Client-side resolvers (no network needed) ---

        // Twitter/X
        if (['x.com', 'twitter.com', 'www.x.com', 'www.twitter.com'].includes(host)) {
            var handle = path.split('/')[0].replace(/^@/, '');
            if (!handle || ['home', 'explore', 'search', 'settings', 'i'].includes(handle.toLowerCase())) {
                throw new Error('Could not extract handle from URL');
            }
            return { source_type: 'twitter', fields: { handle: handle } };
        }

        // arXiv
        if (['arxiv.org', 'www.arxiv.org'].includes(host)) {
            var m = path.match(/^(?:abs|pdf)\/(\d{4}\.\d{4,5})/);
            if (m) {
                return { source_type: 'arxiv', fields: {
                    url: 'https://export.arxiv.org/api/query?search_query=id:' + m[1] + '&max_results=50',
                    name: 'arXiv:' + m[1]
                }, suggested_tags: ['research'] };
            }
            var m2 = path.match(/^list\/([\w.]+)/);
            if (m2) {
                return { source_type: 'arxiv', fields: {
                    url: 'https://export.arxiv.org/api/query?search_query=cat:' + m2[1] + '&sortBy=submittedDate&sortOrder=descending&max_results=50',
                    name: 'arXiv:' + m2[1]
                }, suggested_tags: ['research'] };
            }
            throw new Error('Could not parse arXiv URL. Use /abs/XXXX.XXXXX or /list/cs.AI/recent');
        }

        // Luma
        if (['lu.ma', 'www.lu.ma'].includes(host)) {
            var handle = path.split('/')[0];
            if (!handle) throw new Error('Could not extract Luma handle');
            return { source_type: 'luma', fields: { handle: handle } };
        }

        // RSSHub
        if (['rsshub.app', 'www.rsshub.app'].includes(host)) {
            if (!path) throw new Error('Empty RSSHub route');
            return { source_type: 'rsshub', fields: { route: path, name: 'RSSHub:' + path.split('/').pop() } };
        }

        // Xiaohongshu
        if (['xiaohongshu.com', 'www.xiaohongshu.com', 'xhslink.com'].includes(host)) {
            var m = path.match(/^user\/profile\/([a-fA-F0-9]+)/);
            if (m) {
                return { source_type: 'xiaohongshu', fields: { user_id: m[1], name: 'XHS:' + m[1].slice(0, 8) } };
            }
            throw new Error('Could not parse Xiaohongshu URL. Use a profile URL.');
        }

        // --- Server-side resolvers (need network: YouTube, generic RSS) ---
        if (!sb) throw new Error('Sign in to resolve this URL type');
        var { data: { session } } = await sb.auth.getSession();
        if (!session) throw new Error('Please sign in first');
        var resp = await fetch('/api/resolve-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
            body: JSON.stringify({ url: url })
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.error || data.detail || 'Resolution failed');
        return data;
    }

    function openAddModal() {
        editingSource = null;
        document.getElementById('modal-title').textContent = 'Add Source';
        document.getElementById('source-type').value = '';
        document.getElementById('source-type').disabled = false;
        document.getElementById('source-tags').value = '';
        document.getElementById('dynamic-fields').innerHTML = '';
        document.getElementById('resolve-section').classList.remove('hidden');
        document.getElementById('resolve-url').value = '';
        document.getElementById('resolve-status').classList.add('hidden');
        var overlay = document.getElementById('modal-overlay');
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');
    }

    function openEditModal(source) {
        editingSource = source;
        document.getElementById('modal-title').textContent = 'Edit Source';
        document.getElementById('source-type').value = source.source_type;
        document.getElementById('source-type').disabled = true;
        document.getElementById('source-tags').value = (source.tags || []).join(', ');
        document.getElementById('resolve-section').classList.add('hidden');
        updateFields();
        var overlay = document.getElementById('modal-overlay');
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');
    }

    function closeModal() {
        var overlay = document.getElementById('modal-overlay');
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        editingSource = null;
    }

    document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    async function handleSubmit(e) {
        e.preventDefault();
        var sourceType = document.getElementById('source-type').value;
        if (!sourceType) return;

        // Collect config fields (everything except name and tags)
        var config = {};
        var name = '';
        document.querySelectorAll('#dynamic-fields input[data-field]').forEach(function(inp) {
            if (inp.dataset.field === 'name') {
                name = inp.value;
            } else if (inp.value) {
                config[inp.dataset.field] = inp.value;
            }
        });

        // For types that use handle as name
        if (!name && config.handle) name = config.handle;

        // Client-side validation
        var err = validateSourceFields(sourceType, config, name);
        if (err) { showToast(err, 'error'); return; }

        var tagsStr = document.getElementById('source-tags').value;
        var tags = tagsStr ? tagsStr.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];

        if (editingSource) {
            var { error } = await sb.from('user_sources').update({
                name: name,
                config: config,
                tags: tags,
            }).eq('id', editingSource.id);
            if (error) { showToast(error.message, 'error'); return; }
            showToast('Source updated', 'success');
        } else {
            var { error } = await sb.from('user_sources').insert({
                source_type: sourceType,
                name: name,
                config: config,
                tags: tags,
            });
            if (error) { showToast(error.message, 'error'); return; }
            showToast('Source added', 'success');
        }
        closeModal();
        loadSources();
        return false;
    }

    async function toggleSource(id, isDisabled) {
        var { error } = await sb.from('user_sources').update({ disabled: !JSON.parse(isDisabled) }).eq('id', id);
        if (error) { showToast(error.message, 'error'); return; }
        loadSources();
    }

    async function deleteSource(id, name) {
        if (!confirm('Delete source "' + name + '"?')) return;
        var { error } = await sb.from('user_sources').delete().eq('id', id);
        if (error) { showToast(error.message, 'error'); return; }
        showToast('Source deleted', 'success');
        loadSources();
    }

    // --- Fetch ---
    async function fetchSource(source, btn) {
        if (btn) { btn.disabled = true; btn.textContent = 'Fetching...'; }
        try {
            var { data: { session } } = await sb.auth.getSession();
            if (!session) { showToast('Not logged in', 'error'); return; }
            var resp = await fetch('/api/fetch-source', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + session.access_token,
                },
                body: JSON.stringify({
                    source_type: source.source_type,
                    name: source.name,
                    config: source.config || {},
                    tags: source.tags || [],
                }),
            });
            var result = await resp.json();
            if (!resp.ok) throw new Error(result.error || 'Fetch failed');
            showToast(source.name + ': ' + result.items_fetched + ' items, ' + result.new_items + ' new', 'success');
        } catch (e) {
            showToast(source.name + ': ' + e.message, 'error');
        } finally {
            if (btn) { btn.disabled = false; btn.textContent = 'Fetch'; }
        }
    }

    async function fetchAll(btn) {
        var tbody = document.getElementById('sources-body');
        var sources = tbody._sources || [];
        var enabled = sources.filter(function(s) { return !s.disabled; });
        if (!enabled.length) { showToast('No enabled sources to fetch', 'error'); return; }

        btn.disabled = true;
        var total = enabled.length;
        var done = 0;
        var errors = 0;
        var firstError = '';
        btn.textContent = '0/' + total;

        // Refresh session to get fresh JWT (#109)
        var { data: { session }, error: authError } = await sb.auth.refreshSession();
        if (authError || !session) {
            showToast('Authentication failed. Please sign in again.', 'error');
            btn.disabled = false; btn.textContent = 'Fetch All';
            return;
        }

        // Parallel fetch with concurrency limit of 3 (#109)
        var CONCURRENCY = 3;
        for (var i = 0; i < enabled.length; i += CONCURRENCY) {
            var batch = enabled.slice(i, i + CONCURRENCY);
            var batchResults = await Promise.allSettled(batch.map(function(source) {
                return fetch('/api/fetch-source', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + session.access_token,
                    },
                    body: JSON.stringify({
                        source_type: source.source_type,
                        name: source.name,
                        config: source.config || {},
                        tags: source.tags || [],
                    }),
                }).then(function(resp) {
                    if (!resp.ok) {
                        return resp.text().then(function(text) {
                            try { var r = JSON.parse(text); throw new Error(r.error || resp.status + ' ' + resp.statusText); }
                            catch(e) { if (e instanceof SyntaxError) throw new Error(resp.status + ' ' + resp.statusText); throw e; }
                        });
                    }
                    return resp.json();
                });
            }));
            batchResults.forEach(function(result, idx) {
                done++;
                if (result.status === 'rejected') {
                    errors++;
                    var msg = (result.reason && result.reason.message) || result.reason || 'Unknown error';
                    console.error('Fetch failed for', batch[idx].name, msg);
                    if (!firstError) firstError = batch[idx].name + ': ' + msg;
                }
            });
            btn.textContent = done + '/' + total;
        }

        btn.disabled = false;
        btn.textContent = 'Fetch All';
        if (errors) showToast(errors + '/' + total + ' failed. ' + firstError, 'error');
        else showToast('All ' + total + ' sources fetched', 'success');

        // Notify other tabs that fetch completed (#107)
        try { var ch = new BroadcastChannel('ainews-fetch'); ch.postMessage({ type: 'fetch-complete' }); ch.close(); } catch(e) {}
    }

    // Badges loaded via badges.js (auto mode)

    // --- Init ---
    init();
    </script>
    <script src="badges.js"></script>
    <script src="auth-nav.js"></script>
</body>
