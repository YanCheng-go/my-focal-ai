<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — MyFocalAI</title>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
            document.documentElement.classList.add('dark');
    })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-neutral-950 dark:text-gray-200 antialiased">
    <nav id="main-nav" data-active="leaderboard" class="border-b border-gray-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 sticky top-0 z-50"></nav>
    <script src="nav.js"></script>

    <main class="max-w-4xl mx-auto px-5 py-5">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">AI model benchmarks and ranking sites for manual browsing.</p>
        <div id="items"></div>
    </main>

    <script>
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    // Badges loaded via badges.js (auto mode)

    async function init() {
        try {
            const config = await getConfig();
            const items = config.leaderboard || [];
            document.getElementById('items').innerHTML = items.map(item => `
                <div class="bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-800 rounded-lg p-4 mb-3 hover:border-gray-300 dark:hover:border-neutral-700 transition-colors">
                    <div class="text-base font-semibold"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="text-gray-900 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400">${escapeHtml(item.name)}</a></div>
                    <div class="mt-2 text-xs text-gray-500 dark:text-gray-400 flex gap-2 flex-wrap">${(item.tags || []).map(t => `<span class="bg-indigo-100 text-indigo-700 dark:bg-indigo-950 dark:text-indigo-400 px-2 py-0.5 rounded text-xs">${escapeHtml(t)}</span>`).join('')}</div>
                    <div class="mt-1.5 text-xs"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="text-gray-400 dark:text-gray-500 hover:text-blue-600 dark:hover:text-blue-400">${escapeHtml(item.url)}</a></div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('items').innerHTML = '<p class="text-gray-400 dark:text-gray-500 text-sm">No data available.</p>';
        }
    }
    init();
    </script>
    <script src="shared-config.js"></script>
    <script src="badges.js"></script>
    <script src="auth-nav.js"></script>
</body>
</html>
